<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <style>
        .ldap-container {
            background: linear-gradient(135deg, #e6fffa 0%, #ebf4ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ldap-form {
            background: white;
            border-radius: 15px;
            padding: 2.5rem;
            width: 400px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            transition: border-color 0.3s ease;
        }

        .submit-btn {
            background: var(--primary-blue);
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            transition: background 0.3s ease;
        }

        .third-party-auth {
            margin-top: 2rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="ldap-container">
        <form class="ldap-form" id="ldapLoginForm">
            <div class="form-group">
                <input type="text" 
                       class="form-input"
                       placeholder="学工号"
                       name="username"
                       required>
            </div>
            
            <div class="form-group">
                <input type="password" 
                       class="form-input"
                       placeholder="统一认证密码"
                       name="password"
                       required>
            </div>

            <button type="submit" class="submit-btn">校园认证登录</button>
            
            <div class="third-party-auth">
                <p style="color: var(--primary-blue); margin-bottom: 1rem;">其他登录方式</p>
                <button class="wechat-btn">微信登录</button>
            </div>
        </form>
    </div>
</body>
</html>
